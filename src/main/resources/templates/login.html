<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>
<div th:replace="fragments/header::meta-css-js"></div>
<body>
<div class="container" style="width: 50vw; max-width: 300px">
    <div class="row">
        <form th:action="@{/login}" method="post">
            <div th:if="${param.error}">
                <div class="alert alert-danger">
                    Yanlış şifrə.
                </div>
            </div>
            <div th:if="${param.logout}">
                <div class="alert alert-info">
                    Çıxış olundu.
                </div>
            </div>

            <div class="form-group">
                <label for="username"></label>
                <input type="text" name="username" id="username" class="form-control"
                                                     placeholder="İstifadəçi ID-si" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password"></label>
                <input type="password" name="password" id="password" class="form-control"
                                                     placeholder="Şifrə" required/>
            </div>

            <div class="form-group text-center m-2">
                <input type="submit" class="btn btn-lg btn-primary btn-block" value="Daxil ol"/>
            </div>
        </form>
    </div>
</div>
</body>
</html>
